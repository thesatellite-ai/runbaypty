name: lint

on:
  # Manual only for now: run from the Actions tab (or `gh workflow run lint.yml`).
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt check
        run: |
          out=$(gofmt -l $(find . -name '*.go' -not -path './vendor/*'))
          if [ -n "$out" ]; then
            echo "::error::gofmt needs to be run on:"
            echo "$out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      - name: go mod tidy is a no-op
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
